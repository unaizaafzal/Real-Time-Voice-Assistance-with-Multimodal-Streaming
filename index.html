<!DOCTYPE html>
<html>
<head>
    <title>Voice Assistant - Audio Capture Test</title>
</head>
<body>
    <h1>Audio Capture Test</h1>
    <button id="startBtn">Start Recording</button>
    <button id="stopBtn" disabled>Stop Recording</button>

    <script>
        let mediaRecorder;
        let stream;
        let socket; // NEW: holds our WebSocket connection

        const startBtn = document.getElementById("startBtn");
        const stopBtn = document.getElementById("stopBtn");

        startBtn.addEventListener("click", async () => {
            try {
                // NEW: open the WebSocket connection first, before touching the mic.
                socket = new WebSocket("ws://127.0.0.1:8000/ws/audio");

                socket.onopen = () => {
                    console.log("WebSocket connection opened.");
                };

                socket.onmessage = (event) => {
                    // This fires whenever the server sends something back.
                    // Right now the server echoes bytes, so this logs the echo.
                    console.log("Message from server:", event.data);
                };

                socket.onerror = (err) => {
                    console.error("WebSocket error:", err);
                };

                socket.onclose = () => {
                    console.log("WebSocket connection closed.");
                };

                // Ask the browser for mic access. This triggers the permission popup.
                stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                console.log("Mic access granted. Stream:", stream);

                mediaRecorder = new MediaRecorder(stream);

                mediaRecorder.ondataavailable = (event) => {
                    console.log("Chunk received, size in bytes:", event.data.size);

                    // NEW: send the chunk over the WebSocket, but only if it's open.
                    // socket.readyState === WebSocket.OPEN guards against trying to
                    // send before the connection is ready, or after it's closed.
                    if (socket.readyState === WebSocket.OPEN) {
                        socket.send(event.data); // Blob sent directly, no conversion needed
                        console.log("Chunk sent to server.");
                    } else {
                        console.warn("Socket not open, skipping send.");
                    }
                };

                mediaRecorder.start(250);
                console.log("Recording started.");

                startBtn.disabled = true;
                stopBtn.disabled = false;

            } catch (err) {
                console.error("Error accessing microphone:", err);
            }
        });

        stopBtn.addEventListener("click", () => {
            mediaRecorder.stop();
            stream.getTracks().forEach(track => track.stop());
            console.log("Recording stopped.");

            socket.close(); // NEW: cleanly close the WebSocket too

            startBtn.disabled = false;
            stopBtn.disabled = true;
        });
    </script>
</body>
</html>
